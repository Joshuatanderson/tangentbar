<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#1b2030"/>
      <stop offset="1" stop-color="#0b0d12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5cc8ff" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef1f7" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#eef1f7"/>
      <stop offset="1" stop-color="#eef1f7"/>
    </linearGradient>
  </defs>

  <!-- squircle field -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <!-- soft glow seated at the point of tangency -->
  <circle cx="274" cy="200" r="250" fill="url(#glow)"/>

  <!-- the curve (ring) and the tangent line, touching at one point (no dot) -->
  <g fill="none" stroke-linecap="round">
    <circle cx="203" cy="294" r="130" stroke="#eef1f7" stroke-width="22" stroke-opacity="0.92"/>
    <line x1="107.5" y1="75.5" x2="441.5" y2="295.5" stroke="url(#line)" stroke-width="22"/>
  </g>
</svg>
