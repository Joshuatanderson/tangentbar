name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      - name: Build app bundle
        run: sh scripts/build-app.sh "${GITHUB_REF_NAME}"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/TangentBar-*.zip \
            --title "TangentBar $GITHUB_REF_NAME" \
            --generate-notes
