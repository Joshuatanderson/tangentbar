name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: swift test
      # TCC keys Accessibility grants to the app's code signature. Signing
      # every release with the same identity (scripts/make-signing-cert.sh)
      # keeps the designated requirement stable so users' grants survive
      # updates. An ad-hoc release would break every install's permissions.
      - name: Import signing identity
        env:
          P12_B64: ${{ secrets.MACOS_SIGN_P12_B64 }}
          P12_PASS: ${{ secrets.MACOS_SIGN_P12_PASS }}
        run: |
          [ -n "$P12_B64" ] || { echo "MACOS_SIGN_P12_B64 secret is missing — refusing to ship an ad-hoc-signed release"; exit 1; }
          echo "$P12_B64" | base64 -d > signing.p12
          security create-keychain -p ci-build build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci-build build.keychain
          security import signing.p12 -k build.keychain -P "$P12_PASS" -T /usr/bin/codesign
          security set-key-partition-list -S "apple-tool:,apple:,codesign:" -s -k ci-build build.keychain
          openssl pkcs12 -in signing.p12 -passin "pass:$P12_PASS" -nokeys -clcerts -legacy -out cert.pem 2>/dev/null \
            || openssl pkcs12 -in signing.p12 -passin "pass:$P12_PASS" -nokeys -clcerts -out cert.pem
          sudo security add-trusted-cert -d -r trustRoot -p codeSign -k /Library/Keychains/System.keychain cert.pem
          rm -f signing.p12 cert.pem
      - name: Build app bundle
        run: sh scripts/build-app.sh "${GITHUB_REF_NAME}"
      - name: Verify stable signature
        run: |
          REQ=$(codesign -d -r- dist/TangentBar.app 2>&1 | grep '^designated')
          echo "$REQ"
          echo "$REQ" | grep -q 'certificate leaf' || { echo "app is not signed with the release identity (ad-hoc cdhash requirement) — grants would break on update"; exit 1; }
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/TangentBar-*.zip \
            --title "TangentBar $GITHUB_REF_NAME" \
            --generate-notes
